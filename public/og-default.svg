<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" rx="0"/>

  <!-- Grid pattern -->
  <g opacity="0.08">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Accent bar -->
  <rect x="80" y="180" width="6" height="270" fill="url(#accent)" rx="3"/>

  <!-- Logo -->
  <rect x="80" y="80" width="60" height="60" rx="14" fill="url(#accent)"/>
  <text x="110" y="120" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" fill="#fff" text-anchor="middle">LLM</text>

  <!-- Title -->
  <text x="110" y="220" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="#fff">
    Anatomía de un
  </text>
  <text x="110" y="290" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="url(#accent)">
    Modelo de Lenguaje Grande
  </text>

  <!-- Description -->
  <text x="110" y="350" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400" fill="#a5b4fc">
    Del silicio a la implementación — Hardware, arquitectura,
  </text>
  <text x="110" y="385" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400" fill="#a5b4fc">
    inferencia y entrenamiento de LLMs en español
  </text>

  <!-- Neural network nodes decoration -->
  <g opacity="0.15">
    <circle cx="900" cy="150" r="6" fill="#818cf8"/>
    <circle cx="980" cy="120" r="4" fill="#818cf8"/>
    <circle cx="1050" cy="160" r="5" fill="#818cf8"/>
    <circle cx="940" cy="220" r="4" fill="#818cf8"/>
    <circle cx="1020" cy="200" r="3" fill="#818cf8"/>
    <circle cx="870" cy="250" r="5" fill="#818cf8"/>
    <circle cx="960" cy="290" r="6" fill="#818cf8"/>
    <circle cx="1080" cy="280" r="4" fill="#818cf8"/>
    <line x1="900" y1="150" x2="980" y2="120" stroke="#818cf8" stroke-width="1.5"/>
    <line x1="980" y1="120" x2="1050" y2="160" stroke="#818cf8" stroke-width="1.5"/>
    <line x1="900" y1="150" x2="940" y2="220" stroke="#818cf8" stroke-width="1.5"/>
    <line x1="940" y1="220" x2="1020" y2="200" stroke="#818cf8" stroke-width="1.5"/>
    <line x1="940" y1="220" x2="870" y2="250" stroke="#818cf8" stroke-width="1.5"/>
    <line x1="870" y1="250" x2="960" y2="290" stroke="#818cf8" stroke-width="1.5"/>
    <line x1="960" y1="290" x2="1080" y2="280" stroke="#818cf8" stroke-width="1.5"/>
    <line x1="1050" y1="160" x2="1020" y2="200" stroke="#818cf8" stroke-width="1.5"/>
  </g>

  <!-- URL -->
  <text x="110" y="480" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500" fill="#6366f1">
    llm.javierpenate.com
  </text>
</svg>
